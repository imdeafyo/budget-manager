# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app budget-manager
  namespace: ${NAMESPACE}
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  values:
    baseDomain: ${BASE_DOMAIN}

    controllers:
      main:
        replicas: 1
        containers:
          app:
            probes:
              liveness:
                spec:
                  httpGet:
                    path: /api/health
                    port: http
                  initialDelaySeconds: 10
                  periodSeconds: 30
              readiness:
                spec:
                  httpGet:
                    path: /api/health
                    port: http
                  initialDelaySeconds: 5
                  periodSeconds: 10
            image:
              repository: ghcr.io/YOUR_GITHUB_USER/budget-manager  # <-- UPDATE
              tag: latest
            env:
              TZ: ${timezone}
              PORT: "3000"
              DATABASE_URL: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@budget-manager-cnpg-db-rw.default.svc.cluster.local:5432/budget_manager"
              PGSSLMODE: "require"
              POSTGRES_USER:
                secretKeyRef:
                  name: ${APP}-postgres
                  key: username
              POSTGRES_PASSWORD:
                secretKeyRef:
                  name: ${APP}-postgres
                  key: password
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 256Mi

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 3000
            targetPort: 3000

    ingress:
      main:
        enabled: true
        className: traefik
        hosts:
          - host: "budget.${BASE_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: http
