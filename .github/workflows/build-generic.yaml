name: Build Generic HTML

on:
  push:
    branches: [main]
    paths:
      - 'src/frontend/**'
      - 'scripts/build-generic.mjs'
  workflow_dispatch:

jobs:
  build-generic:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - uses: actions/setup-node@v5
      with:
        node-version: '22'

    - name: Install frontend dependencies
      run: cd src/frontend && npm ci

    - name: Build generic HTML
      run: node scripts/build-generic.mjs

    - name: Check for changes
      id: check
      run: |
        git diff --quiet budget-manager-generic.html && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

    - name: Commit & push
      if: steps.check.outputs.changed == 'true'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add budget-manager-generic.html
        git commit -m "Auto-build generic HTML from App.jsx [skip ci]"
        git push
