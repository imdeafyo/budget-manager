name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    # Skip the bot's auto-build commits ([skip ci]) — same loop-prevention
    # logic as the other workflows. Merges are NOT skipped because the
    # commit being merged in often contains real changes that need testing.
    if: >-
      ${{ github.event_name != 'push'
          || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend deps
        working-directory: src/frontend
        run: npm ci

      - name: Install root deps
        # Needed for the server-side test suite, which requires('pg') and
        # the project's own src/lib/* modules (logger pulls in pino).
        run: npm ci

      - name: Run tests
        working-directory: src/frontend
        run: npm test

      - name: Run server-side regression tests
        # Pins the prod-boot pool wrapper fix + future server-side regressions.
        # Runs from repo root; src/lib pulls in pg and pino from the root
        # package.json (installed in the step above).
        run: node --test src/lib/*.test.js
