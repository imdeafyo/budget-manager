name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    # Skip the bot's auto-build commits ([skip ci]) — same loop-prevention
    # logic as the other workflows. Merges are NOT skipped because the
    # commit being merged in often contains real changes that need testing.
    if: >-
      ${{ github.event_name != 'push'
          || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend deps
        working-directory: src/frontend
        run: npm ci

      - name: Run tests
        working-directory: src/frontend
        run: npm test
